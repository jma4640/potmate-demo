<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1410" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8F0"/>
      <stop offset="1" stop-color="#F3E1D0"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFDF9"/>
      <stop offset="1" stop-color="#F8EFE5"/>
    </linearGradient>
    <linearGradient id="menuPhotoA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4B2E2B"/>
      <stop offset="0.55" stop-color="#8C5A3C"/>
      <stop offset="1" stop-color="#C08552"/>
    </linearGradient>
    <linearGradient id="menuPhotoB" x1="0.1" y1="0" x2="1" y2="1">
      <stop stop-color="#5E3C2F"/>
      <stop offset="0.55" stop-color="#A76D46"/>
      <stop offset="1" stop-color="#E7C49D"/>
    </linearGradient>
    <linearGradient id="panelGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF6EC"/>
      <stop offset="1" stop-color="#F3E4D4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#4B2E2B" flood-opacity="0.12"/>
    </filter>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#2D1816" flood-opacity="0.25"/>
    </filter>
    <style>
      .title { font: 700 46px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #4B2E2B; }
      .subtitle { font: 500 20px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #8C5A3C; }
      .label { font: 700 16px 'Segoe UI', 'Noto Sans KR', sans-serif; letter-spacing: 1.6px; fill: #C08552; }
      .h2 { font: 700 28px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #4B2E2B; }
      .cardTitle { font: 700 30px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #4B2E2B; }
      .cardText { font: 500 18px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #8C5A3C; }
      .price { font: 800 28px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #4B2E2B; }
      .chip { font: 700 17px 'Segoe UI', 'Noto Sans KR', sans-serif; }
      .small { font: 600 15px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #8C5A3C; }
      .sum { font: 800 34px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #FFF8F0; }
      .button { font: 800 22px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #FFF8F0; }
      .mini { font: 700 14px 'Segoe UI', 'Noto Sans KR', sans-serif; fill: #FFF8F0; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="40" fill="url(#bg)"/>
  <circle cx="1340" cy="120" r="230" fill="#C08552" fill-opacity="0.10"/>
  <circle cx="210" cy="860" r="250" fill="#8C5A3C" fill-opacity="0.08"/>
  <circle cx="1520" cy="830" r="180" fill="#4B2E2B" fill-opacity="0.06"/>

  <rect x="54" y="46" width="1492" height="908" rx="34" fill="#FFF8F0" fill-opacity="0.62" stroke="#E9D2B9"/>

  <text x="92" y="110" class="label">YAKITEI KIOSK MOCKUP</text>
  <text x="92" y="166" class="title">야끼테이 (やきてい)</text>
  <text x="92" y="202" class="subtitle">철판 향이 살아있는 야끼소바와 지금 가장 많이 담는 토핑 추천</text>

  <g filter="url(#softShadow)">
    <rect x="72" y="240" width="876" height="634" rx="34" fill="url(#cardFill)"/>
  </g>
  <text x="106" y="294" class="label">MENU GALLERY</text>
  <text x="106" y="338" class="h2">메뉴를 고르면 오른쪽에서 주문이 바로 완성됩니다</text>

  <g filter="url(#softShadow)">
    <rect x="106" y="374" width="386" height="364" rx="30" fill="#FFF9F3" stroke="#EAD5BE"/>
    <rect x="528" y="374" width="386" height="364" rx="30" fill="#FFF9F3" stroke="#EAD5BE"/>
  </g>

  <g>
    <rect x="128" y="394" width="342" height="202" rx="26" fill="url(#menuPhotoA)"/>
    <ellipse cx="300" cy="496" rx="112" ry="78" fill="#1E130F" fill-opacity="0.38"/>
    <ellipse cx="300" cy="488" rx="120" ry="80" fill="#EFCF92"/>
    <ellipse cx="300" cy="488" rx="104" ry="66" fill="#A04C2E"/>
    <path d="M212 466C236 436 263 430 289 451C321 476 347 438 385 457" stroke="#F5D07A" stroke-width="10" stroke-linecap="round"/>
    <path d="M222 505C244 481 281 474 314 490C345 505 365 486 382 473" stroke="#F8DE98" stroke-width="9" stroke-linecap="round"/>
    <path d="M216 530C244 509 278 517 302 533C326 548 350 539 380 515" stroke="#F6C768" stroke-width="8" stroke-linecap="round"/>
    <circle cx="370" cy="454" r="16" fill="#F5E7D2"/>
    <circle cx="392" cy="476" r="10" fill="#D95831"/>
    <rect x="141" y="410" width="102" height="30" rx="15" fill="#FFF8F0" fill-opacity="0.2"/>
    <text x="160" y="431" class="mini">BEST</text>
  </g>

  <g>
    <rect x="550" y="394" width="342" height="202" rx="26" fill="url(#menuPhotoB)"/>
    <ellipse cx="722" cy="496" rx="112" ry="78" fill="#1E130F" fill-opacity="0.30"/>
    <ellipse cx="722" cy="488" rx="120" ry="80" fill="#F1D9A8"/>
    <ellipse cx="722" cy="488" rx="104" ry="66" fill="#7C6045"/>
    <path d="M630 464C655 437 686 432 711 452C734 470 765 470 802 448" stroke="#F6E3AE" stroke-width="10" stroke-linecap="round"/>
    <path d="M642 502C664 482 695 480 726 493C761 508 785 488 808 474" stroke="#FFECC3" stroke-width="9" stroke-linecap="round"/>
    <path d="M638 532C664 513 695 515 718 530C748 548 779 543 806 520" stroke="#F8DA90" stroke-width="8" stroke-linecap="round"/>
    <circle cx="786" cy="452" r="14" fill="#FFF1C9"/>
    <circle cx="812" cy="481" r="8" fill="#F4B36E"/>
    <rect x="563" y="410" width="132" height="30" rx="15" fill="#FFF8F0" fill-opacity="0.2"/>
    <text x="581" y="431" class="mini">NEW FAVORITE</text>
  </g>

  <text x="128" y="640" class="cardTitle">기본 야끼소바</text>
  <text x="128" y="670" class="cardText">달콤한 데리야끼 풍미, 가장 익숙하고 진한 감칠맛</text>
  <text x="128" y="712" class="price">11,000원</text>
  <rect x="346" y="682" width="118" height="36" rx="18" fill="#F1D7BE"/>
  <text x="375" y="705" class="small" fill="#4B2E2B">대표 메뉴</text>

  <text x="550" y="640" class="cardTitle">소금 야끼소바</text>
  <text x="550" y="670" class="cardText">맑고 고소한 감칠맛, 해산물 토핑과 특히 잘 어울림</text>
  <text x="550" y="712" class="price">11,000원</text>
  <rect x="762" y="682" width="124" height="36" rx="18" fill="#EBD8C6"/>
  <text x="792" y="705" class="small" fill="#4B2E2B">추천 선택</text>

  <text x="106" y="792" class="label">DRINKS</text>
  <g>
    <rect x="106" y="816" width="184" height="42" rx="21" fill="#FFF2E2" stroke="#E3C5A6"/>
    <text x="128" y="843" class="small" fill="#4B2E2B">콜라 2,000원</text>
    <rect x="302" y="816" width="184" height="42" rx="21" fill="#FFF2E2" stroke="#E3C5A6"/>
    <text x="324" y="843" class="small" fill="#4B2E2B">사이다 2,000원</text>
    <rect x="498" y="816" width="184" height="42" rx="21" fill="#FFF2E2" stroke="#E3C5A6"/>
    <text x="520" y="843" class="small" fill="#4B2E2B">생맥주 5,000원</text>
    <rect x="694" y="816" width="184" height="42" rx="21" fill="#4B2E2B"/>
    <text x="720" y="843" class="small" fill="#FFF8F0">하이볼 7,000원</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="980" y="160" width="546" height="720" rx="34" fill="url(#panelGlow)"/>
  </g>
  <text x="1016" y="214" class="label">LIVE ORDER PANEL</text>
  <text x="1016" y="256" class="h2">선택한 메뉴와 인기 조합이 여기서 완성됩니다</text>

  <g>
    <rect x="1016" y="284" width="474" height="120" rx="24" fill="#FFF9F3" stroke="#E9D3BD"/>
    <rect x="1036" y="304" width="114" height="80" rx="20" fill="url(#menuPhotoB)"/>
    <ellipse cx="1093" cy="344" rx="34" ry="23" fill="#EFD7A5"/>
    <path d="M1068 338C1078 330 1096 330 1106 339C1116 347 1132 346 1140 338" stroke="#F7E8BF" stroke-width="5" stroke-linecap="round"/>
    <text x="1170" y="332" class="label">SELECTED</text>
    <text x="1170" y="364" class="cardTitle" style="font-size:26px">소금 야끼소바</text>
    <text x="1170" y="390" class="cardText" style="font-size:17px">깔끔한 풍미에 해산물 토핑이 잘 어울립니다</text>
    <text x="1400" y="364" class="price" style="font-size:24px">11,000원</text>
  </g>

  <text x="1016" y="452" class="label">REAL-TIME RECOMMENDATION</text>
  <g>
    <rect x="1016" y="472" width="228" height="104" rx="24" fill="#4B2E2B"/>
    <text x="1040" y="506" class="mini">가장 많이 담는 조합</text>
    <text x="1040" y="542" class="cardTitle" style="font-size:23px; fill:#FFF8F0">오징어새우 + 면 추가</text>
    <text x="1040" y="568" class="small" fill="#F5DCC5">실시간 1위 추천</text>

    <rect x="1262" y="472" width="228" height="104" rx="24" fill="#EFDCC8"/>
    <text x="1286" y="506" class="label" fill="#8C5A3C">SECOND BEST</text>
    <text x="1286" y="542" class="cardTitle" style="font-size:22px">오징어새우 + 계란</text>
    <text x="1286" y="568" class="small">해산물 풍미 강화</text>
  </g>

  <text x="1016" y="624" class="label">TOPPINGS</text>
  <g>
    <rect x="1016" y="644" width="152" height="48" rx="24" fill="#4B2E2B"/>
    <text x="1045" y="675" class="chip" fill="#FFF8F0">오징어새우 +1,500</text>

    <rect x="1180" y="644" width="124" height="48" rx="24" fill="#FFF7EE" stroke="#DDB896"/>
    <text x="1213" y="675" class="chip" fill="#8C5A3C">비엔나 +1,500</text>

    <rect x="1316" y="644" width="124" height="48" rx="24" fill="#C08552"/>
    <text x="1350" y="675" class="chip" fill="#FFF8F0">면 추가 +1,000</text>

    <rect x="1016" y="706" width="162" height="48" rx="24" fill="#FFF7EE" stroke="#DDB896"/>
    <text x="1047" y="737" class="chip" fill="#8C5A3C">계란 프라이 +1,000</text>

    <rect x="1190" y="706" width="116" height="48" rx="24" fill="#FFF7EE" stroke="#DDB896"/>
    <text x="1232" y="737" class="chip" fill="#8C5A3C">치즈 +1,000</text>
  </g>

  <text x="1016" y="804" class="label">ORDER SUMMARY</text>
  <g>
    <rect x="1016" y="824" width="474" height="40" rx="20" fill="#FFF9F3"/>
    <text x="1034" y="850" class="small" fill="#4B2E2B">소금 야끼소바 x1</text>
    <text x="1414" y="850" class="small" fill="#4B2E2B">11,000원</text>

    <rect x="1016" y="870" width="474" height="40" rx="20" fill="#FFF9F3"/>
    <text x="1034" y="896" class="small" fill="#4B2E2B">오징어새우, 면 추가</text>
    <text x="1414" y="896" class="small" fill="#4B2E2B">2,500원</text>

    <rect x="1016" y="916" width="474" height="40" rx="20" fill="#FFF9F3"/>
    <text x="1034" y="942" class="small" fill="#4B2E2B">하이볼 x1</text>
    <text x="1414" y="942" class="small" fill="#4B2E2B">7,000원</text>
  </g>

  <g filter="url(#innerShadow)">
    <rect x="1148" y="812" width="342" height="146" rx="28" fill="#8C5A3C"/>
  </g>
  <text x="1176" y="854" class="label" fill="#F6E2D2">TOTAL</text>
  <text x="1176" y="910" class="sum">20,500원</text>
  <rect x="1176" y="922" width="286" height="48" rx="24" fill="#4B2E2B"/>
  <text x="1260" y="953" class="button">주문하기</text>
</svg>
